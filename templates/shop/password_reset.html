м{% extends 'shop/base.html' %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h2 class="auth-title">Відновлення пароля</h2>
        <p class="auth-subtitle">Введіть ваш email, і ми надішлемо посилання для скидання</p>

        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <div class="form-group">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <span class="form-error">{{ field.errors.0 }}</span>
                    {% endif %}
                </div>
            {% endfor %}
            <button type="submit" class="btn-auth">Надіслати лист</button>
        </form>

        <div class="auth-switch">
            <a href="{% url 'login' %}">← Назад до входу</a>
        </div>
    </div>
</div>

<style>
    /* Додай цей стиль, щоб інпут був гарним */
    input[type="email"] {
        width: 100%;
        padding: 12px 15px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 15px;
    }
</style>
{% endblock %}
